spring:
  datasource:
    url: jdbc:h2:mem:ai_learning_workflow_navigator_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

# Let tests run without binding to a fixed port
server:
  port: 0

