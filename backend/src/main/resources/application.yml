spring:
  application:
    name: learning-backend
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_learning}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}] [requestId=%X{requestId:-}]"
  level:
    root: INFO
    com.pandanav.learning: DEBUG

app:
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:change-me-please-change-me-please-change-me}
    token-expire-days: ${APP_AUTH_TOKEN_EXPIRE_DAYS:7}
  tutor:
    llm:
      enabled: ${TUTOR_LLM_ENABLED:false}
      provider: ${TUTOR_LLM_PROVIDER:deepseek}
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${TUTOR_LLM_BASE_URL:https://api.deepseek.com/v1}
      model: ${TUTOR_LLM_MODEL:deepseek-chat}
      timeout-ms: ${TUTOR_LLM_TIMEOUT_MS:10000}
      max-output-tokens: ${TUTOR_LLM_MAX_OUTPUT_TOKENS:700}
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: ${LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    timeout-ms: ${LLM_TIMEOUT_MS:20000}
    max-retries: ${LLM_MAX_RETRIES:0}
    retry-backoff-ms: ${LLM_RETRY_BACKOFF_MS:200}
    structure-max-output-tokens: ${LLM_STRUCTURE_MAX_OUTPUT_TOKENS:500}
    training-max-output-tokens: ${LLM_TRAINING_MAX_OUTPUT_TOKENS:500}
    evaluation-max-output-tokens: ${LLM_EVALUATION_MAX_OUTPUT_TOKENS:600}
    tutor-max-output-tokens: ${LLM_TUTOR_MAX_OUTPUT_TOKENS:700}
    fallback-to-rule: ${LLM_FALLBACK_TO_RULE:true}
    force-fallback: ${LLM_FORCE_FALLBACK:false}
    log-request: ${LLM_LOG_REQUEST:false}
    log-response: ${LLM_LOG_RESPONSE:false}
    observability:
      enabled: ${LLM_OBSERVABILITY_ENABLED:true}
