spring:
  application:
    name: learning-workflow-navigator-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    # 默认不要连共享远端库；需要时通过环境变量覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_learning_workflow_navigator}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

server:
  port: 8080

# CORS will be configured in code for /api

navigator:
  llm:
    enabled: ${NAVIGATOR_LLM_ENABLED:false}
    baseUrl: ${NAVIGATOR_LLM_BASE_URL:https://api.openai.com}
    apiKey: ${NAVIGATOR_LLM_API_KEY:}
    model: ${NAVIGATOR_LLM_MODEL:gpt-4.1-mini}
    connectTimeoutMs: ${NAVIGATOR_LLM_CONNECT_TIMEOUT_MS:3000}
    timeoutMs: ${NAVIGATOR_LLM_TIMEOUT_MS:60000}
    feedbackTimeoutMs: ${NAVIGATOR_LLM_FEEDBACK_TIMEOUT_MS:10000}
