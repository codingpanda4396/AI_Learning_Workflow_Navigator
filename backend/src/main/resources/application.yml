spring:
  application:
    name: learning-backend
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_learning}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.pandanav.learning: DEBUG

app:
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: ${LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
    timeout-ms: ${LLM_TIMEOUT_MS:30000}
    max-retries: ${LLM_MAX_RETRIES:2}
    retry-backoff-ms: ${LLM_RETRY_BACKOFF_MS:500}
    fallback-to-rule: ${LLM_FALLBACK_TO_RULE:true}
    log-request: ${LLM_LOG_REQUEST:false}
    log-response: ${LLM_LOG_RESPONSE:false}
