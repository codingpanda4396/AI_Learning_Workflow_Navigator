spring:
  application:
    name: learning-backend
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_learning}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.pandanav.learning: DEBUG
