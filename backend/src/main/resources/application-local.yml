spring:
  config:
    activate:
      on-profile: local

  datasource:
    # 本地开发默认仍连当前共享开发库（便于开箱即用）；如需本地库/其它库用环境变量覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://8.145.55.7:5432/ai_learning_workflow_navigator}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:439695}
    hikari:
      # 远端库/LB 常先回收空闲连接；短于对端 idle 可避免「Failed to validate connection … closed」
      max-lifetime: 300000

  flyway:
    # local 环境避免被历史 checksum 阻断；远端/CI 环境建议保持默认 true
    validate-on-migrate: false

logging:
  level:
    # 本地排查 LLM：每次 chat.completions 请求/响应摘要（不含 apiKey）
    navigator.application.llm: DEBUG

navigator:
  llm:
    enabled: true
    # 注意：当前网关会自动拼接 /v1/chat/completions，因此这里不要写到 .../compatible-mode/v1
    baseUrl: https://dashscope.aliyuncs.com/compatible-mode
    apiKey: ${NAVIGATOR_LLM_API_KEY:sk-632cf870688143a8afde59259c20501d}
    model: qwen3.5-plus
    # 云端首包常 >8s，过短会 Read timed out 并降级 MOCK
    timeoutMs: ${NAVIGATOR_LLM_TIMEOUT_MS:60000}

