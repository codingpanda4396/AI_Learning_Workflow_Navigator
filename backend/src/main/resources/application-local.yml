spring:
  config:
    activate:
      on-profile: local

  datasource:
    # Local dev defaults to the shared development database. Override with env vars if needed.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://8.145.55.7:5432/ai_learning_workflow_navigator}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:439695}
    hikari:
      # Keep max lifetime below upstream idle recycling to avoid stale pooled connections.
      max-lifetime: 300000

  flyway:
    # Relax checksum validation in local development only.
    validate-on-migrate: false

logging:
  level:
    # Log LLM request/response summaries locally without exposing the API key.
    navigator.application.llm: DEBUG

navigator:
  llm:
    enabled: true
    # OpenAI-compatible endpoint; adapter will append /v1/chat/completions.
    baseUrl: https://api.deepseek.com/v1
    apiKey: ${NAVIGATOR_LLM_API_KEY:}
    model: deepseek-chat
    # Keep a generous timeout to avoid false read-timeout failures on first token.
    timeoutMs: ${NAVIGATOR_LLM_TIMEOUT_MS:60000}
    feedbackTimeoutMs: ${NAVIGATOR_LLM_FEEDBACK_TIMEOUT_MS:60000}
