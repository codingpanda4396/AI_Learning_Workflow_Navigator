# ============================================================
# 生产环境配置
# 通过环境变量注入敏感信息，不要在此文件写密码
# ============================================================
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO
    com.pandanav.learning: INFO

app:
  llm:
    enabled: ${LLM_ENABLED:true}
    provider: ${LLM_PROVIDER:openai-compatible}
    base-url: ${LLM_BASE_URL}
    api-key: ${LLM_API_KEY}
    model: ${LLM_MODEL}
    timeout-ms: ${LLM_TIMEOUT_MS:10000}
    fallback-to-rule: ${LLM_FALLBACK_TO_RULE:true}
    log-request: ${LLM_LOG_REQUEST:false}
    log-response: ${LLM_LOG_RESPONSE:false}
